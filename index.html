<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sorted</title>
    <style>
        :root {
            --bg-color: #1a1a2e;
            --header-color: #16213e;
            --text-color: #e9e9e9;
            --accent-color: #4ecca3;
            --button-bg: #0f3460;
            --button-hover: #533483;
            --cat-color: #555;
            --cat-bg: rgba(85, 85, 85, 0.1);
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            overflow: auto;
            min-height: 100vh;
        }

        .floating {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            min-height: 50px;
            z-index: 999;
            background-color: var(--header-color);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 5px 15px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
            border-bottom: 2px solid var(--accent-color);
            box-sizing: border-box;
        }

        .floating button {
            background-color: var(--button-bg);
            color: white;
            border: 1px solid var(--accent-color);
            border-radius: 4px;
            padding: 6px 12px;
            font-size: 0.85em;
            cursor: pointer;
            transition: background 0.2s;
        }

        #board {
            display: flex;
            flex-direction: column;
            width: 100vw;
            padding-top: 100px;
            padding-bottom: 40px;
            min-height: 100vh;
            box-sizing: border-box;
            align-items: center;
            justify-content: flex-start;
            font-size: 16px;
        }

        .board-row {
            display: flex;
            width: 95%;
            justify-content: center;
            gap: 8px;
            margin-bottom: 10px;
            flex-wrap: nowrap;
        }

        .game-button {
            background-color: var(--button-bg);
            color: var(--text-color);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 1.25em;
            flex: 0 1 auto;
            width: max-content;
            min-width: 5em;        
            max-width: 15em;
            min-height: 3.5em;
            padding: 0.5em 1em;
            font-size: 0.85em;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            word-wrap: break-word;
            white-space: nowrap;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 3px 3px 10px rgba(0,0,0,0.4);
            outline-offset: -3px;
            position: relative;
        }

        .game-button.partial-match,
        .game-button:disabled {
            white-space: normal;
        }

        .game-button.partial-match {
            border: 2px dashed var(--cat-color) !important;
            background-color: transparent !important;
        }

        .game-button:disabled {
            border: 2px solid var(--cat-color) !important;
            background-color: var(--cat-bg) !important;
            cursor: default;
            opacity: 0.9;
        }

        .game-button.is-selected {
            outline: 3px solid #ffffff !important;
            transform: scale(1.05);
            z-index: 10;
        }

        .word-count-badge {
            position: absolute;
            top: -8px;
            right: -8px;
            background-color: var(--accent-color);
            color: #1a1a2e;
            font-size: 0.75em;
            font-weight: 800;
            padding: 2px 7px;
            border-radius: 10px;
        }

        .level-info {
            font-size: 0.9em;
            color: var(--accent-color);
            background: rgba(0,0,0,0.3);
            padding: 4px 10px;
            border-radius: 20px;
            border: 1px solid var(--accent-color);
            font-weight: bold;
        }

        #rewardModal {
            display: none;
            position: fixed;
            z-index: 3000;
            left: 0; top: 0; 
            width: 100%; height: 100%;
            background: rgba(10, 10, 25, 0.98);
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .reward-container {
            text-align: center;
            max-width: 600px;
            padding: 20px;
        }

        .reward-options {
            display: flex;
            gap: 20px;
            margin-top: 30px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .reward-card {
            background: var(--button-bg);
            border: 2px solid var(--accent-color);
            padding: 20px;
            border-radius: 15px;
            width: 150px;
            cursor: pointer;
            transition: transform 0.2s, background-color 0.2s;
        }

        .reward-card:hover {
            transform: translateY(-10px);
            background: var(--button-hover);
        }

        #fireworks {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1500;
            pointer-events: none;
            display: none;
        }

        .shake { animation: shake 0.5s; }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            50% { transform: translateX(5px); }
            75% { transform: translateX(-5px); }
        }
    </style>
</head>

        var M = 4;
        var N = 4;
        var selected = 0;
        var wordlist = [];

        function restartCurrentLevel() {
            if (confirm("Are you sure you want to restart this level? This will generate a completely fresh board of words for your current level.")) {
                localStorage.removeItem('game_state');
                selected = 0;
                window.location.reload();
            }
        }

        function applyCategoryStyle(btn, catName) {
            const baseColor = stringToLightColor(catName);
            const bg = baseColor.replace(/,\s*[0-9]+%\)/g, ', 22%, 0.18)').replace('hsl', 'hsla');
            btn.style.setProperty('--cat-color', baseColor);
            btn.style.setProperty('--cat-bg', bg);
        }

        function getLevelConfig(lvl) {
            if (lvl > 10) {
                return {
                    m: 8 + Math.floor((lvl - 10) / 2),
                    n: 7 + Math.floor((lvl - 10) / 3)
                };
            }
            const configs = {
                1:  { m: 4, n: 4 }, 
                2:  { m: 4, n: 5 }, 
                3:  { m: 5, n: 4 }, 
                4:  { m: 5, n: 5 }, 
                5:  { m: 5, n: 6 }, 
                6:  { m: 6, n: 5 }, 
                7:  { m: 6, n: 6 }, 
                8:  { m: 7, n: 6 }, 
                9:  { m: 7, n: 7 }, 
                10: { m: 8, n: 7 }  
            };
            return configs[lvl] || { m: 4, n: 4 };
        }

        function calculateColumns(totalItems) {
            if (totalItems <= 0) return 1;
            const boardWidth = window.innerWidth;
            const boardHeight = window.innerHeight - 120;
            const aspectRatio = boardWidth / boardHeight;
            let cols = Math.round(Math.sqrt(totalItems * aspectRatio));
            
            if (aspectRatio < 0.8) {
                const maxCols = totalItems > 30 ? 4 : 3;
                cols = Math.max(2, Math.min(cols, maxCols));
            } else {
                cols = Math.max(3, Math.min(cols, Math.ceil(Math.sqrt(totalItems * 1.2))));
            }
            return Math.max(1, Math.min(cols, totalItems));
        }

        function checkCategories() {
            wordlist = [];
            const lvl = parseInt(localStorage.getItem('gameLevel') || 1);
            const config = getLevelConfig(lvl);
            
            M = config.m;
            N = config.n; 
            document.getElementById("currentLevelDisplay").innerText = lvl;

            let discovered = JSON.parse(localStorage.getItem('discoveredThemes'));
            if (!discovered) {
                discovered = Object.keys(THEME_DATA.starterPool);
                localStorage.setItem('discoveredThemes', JSON.stringify(discovered));
            }

            let categoryPool = {};
            const allAvailableThemes = { ...THEME_DATA.starterPool, ...THEME_DATA.unlockPool };
            
            discovered.forEach(t => {
                let source = allAvailableThemes[t];
                if (source) {
                    if (Array.isArray(source)) {
                        categoryPool[t] = source;
                    } else {
                        Object.assign(categoryPool, source);
                    }
                }
            });

            let catNames = Object.keys(categoryPool);
            let chosenCats = [];

            const forcedCat = localStorage.getItem('forcedNextCategory');
            if (forcedCat && catNames.includes(forcedCat)) {
                chosenCats.push(forcedCat);
                catNames = catNames.filter(name => name !== forcedCat);
                localStorage.removeItem('forcedNextCategory');
            }

            shuffleArray(catNames);
            
            while (chosenCats.length < M && catNames.length > 0) {
                chosenCats.push(catNames.shift());
            }

            chosenCats.forEach(cat => {
                let words = [...categoryPool[cat]];
                shuffleArray(words);
                let localTargetN = Math.min(N, words.length);
                for(let i = 0; i < localTargetN; i++) {
                    wordlist.push([words[i], cat, localTargetN]);
                }
            });
        }

        function finishCategory(b) {
            b.innerHTML = `<div style="font-size:0.7em">CATEGORY</div><b>${b.category.toUpperCase()}</b><div style="font-size:0.6em">${b.cluster.join(', ')}</div>`;
            b.disabled = true;
            b.classList.remove('partial-match');
            const badge = b.querySelector('.word-count-badge');
            if (badge) badge.remove();

            saveState();
            checkWin();
        }

        function checkWin() {
            const remaining = document.querySelectorAll('.game-button:not([disabled])');
            if (remaining.length === 0) {
                startFireworks();
                setTimeout(() => { 
                    stopFireworks();
                    triggerLevelUp(); 
                }, 2000);
            }
        }

        function triggerLevelUp() {
            let currentLvl = parseInt(localStorage.getItem('gameLevel') || 1);
            let newLvl = currentLvl + 1;
            const config = getLevelConfig(newLvl);
            
            localStorage.setItem('gameLevel', newLvl);
            localStorage.removeItem('game_state');
            
            const message = `Level ${newLvl} Unlocked!\n\n` +
                            `New Challenge:\n` +
                            `- ${config.m} Categories\n` +
                            `- ${config.n} Words per category\n\n` +
                            `The board is resetting. Good luck!`;

            if ((newLvl - 1) % 10 === 0) {
                let highestCheckpoint = parseInt(localStorage.getItem('highestCheckpoint') || 1);
                if (newLvl > highestCheckpoint) {
                    localStorage.setItem('highestCheckpoint', newLvl);
                    alert(`🎉 Milestone reached! Permanent checkpoint unlocked at Level ${newLvl}.`);
                }
            }

            if (newLvl > 1 && newLvl % 2 !== 0) {
                alert(message);
                const rewardShown = showRewardOptions();
                if (!rewardShown) window.location.reload(); 
            } else {
                alert(message);
                window.location.reload();
            }
        }

        function showRewardOptions() {
            const discovered = JSON.parse(localStorage.getItem('discoveredThemes')) || Object.keys(THEME_DATA.starterPool);
            const available = Object.keys(THEME_DATA.unlockPool).filter(t => !discovered.includes(t));
            
            if (available.length === 0) return false;

            shuffleArray(available);
            const choices = available.slice(0, 3);
            const container = document.getElementById("rewardOptions");
            container.innerHTML = "";

            choices.forEach(theme => {
                const card = document.createElement('div');
                card.className = "reward-card";
                card.innerHTML = `<h3>${theme}</h3><p>Click to Unlock</p>`;
                
                const themeColor = stringToLightColor(theme);
                card.style.borderColor = themeColor;
                card.style.boxShadow = `0 4px 15px ${themeColor.replace('hsl', 'hsla').replace(')', ', 0.35)')}`;
                
                card.onclick = () => selectReward(theme);
                container.appendChild(card);
            });

            document.getElementById("rewardModal").style.display = "flex";
            return true;
        }

        function selectReward(chosenCategory) {
            let discovered = JSON.parse(localStorage.getItem('discoveredThemes')) || Object.keys(THEME_DATA.starterPool);
            let enabled = JSON.parse(localStorage.getItem('themePrefs')) || [...discovered];

            if (!discovered.includes(chosenCategory)) {
                discovered.push(chosenCategory);
                enabled.push(chosenCategory);
            }

            localStorage.setItem('discoveredThemes', JSON.stringify(discovered));
            localStorage.setItem('themePrefs', JSON.stringify(enabled));
            localStorage.setItem('forcedNextCategory', chosenCategory);
            
            document.getElementById("rewardModal").style.display = "none";
            setTimeout(() => { window.location.reload(); }, 50);
        }

        function deselect() {
            if (selected) {
                selected.classList.remove('is-selected');
                selected.style.outline = "";
                selected = 0;
            }
        }

        function createButtonFromData(data) {
            const btn = document.createElement('button');
            btn.className = 'game-button';
            btn.category = data.category;
            btn.cluster = data.cluster || [];
            btn.targetN = data.targetN || N;
            btn.innerHTML = data.innerHTML || btn.cluster[0];
            btn.disabled = data.disabled || false;

            applyCategoryStyle(btn, btn.category);

            if (btn.cluster.length > 1 && btn.cluster.length < btn.targetN) {
                btn.classList.add('partial-match');
                const badge = document.createElement('span');
                badge.className = 'word-count-badge';
                badge.textContent = `${btn.cluster.length}/${btn.targetN}`;
                btn.appendChild(badge);
            }

            btn.onclick = () => handleButtonClick(btn);
            return btn;
        }

        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
        }

        function handleButtonClick(button) {
            if (selected === button) { 
                button.classList.remove('is-selected');
                deselect(); 
                return; 
            }
            
            if (selected) selected.classList.remove('is-selected');
            button.classList.add('is-selected');
            
            if (!selected) {
                selected = button;
                return;
            }

            if (button.category === selected.category) {
                button.cluster = button.cluster.concat(selected.cluster);
                button.innerHTML = '<b>' + button.cluster.join(', ') + '</b>';
                
                const oldRow = selected.parentElement;
                selected.remove();
                if (oldRow.children.length === 0) oldRow.remove();

                if (button.cluster.length === button.targetN) {
                    finishCategory(button);
                } else {
                    button.classList.add('partial-match');
                    let b = button.querySelector('.word-count-badge') || document.createElement('span');
                    b.className = 'word-count-badge';
                    b.textContent = `${button.cluster.length}/${button.targetN}`;
                    button.appendChild(b);
                }
                button.classList.remove('is-selected');
                selected = 0;
                saveState();
            } else {
                button.style.outline = "3px solid #ff4b2b";
                selected.style.outline = "3px solid #ff4b2b";
                button.classList.add('shake');
                selected.classList.add('shake');
                let s = selected;
                let b = button;
                setTimeout(() => {
                    b.classList.remove('shake', 'is-selected');
                    s.classList.remove('shake', 'is-selected');
                    b.style.outline = "";
                    s.style.outline = "";
                    deselect();
                }, 500);
            }
        }

        function resetToLevelOne() {
            const highestCheckpoint = parseInt(localStorage.getItem('highestCheckpoint') || 1);

            if (highestCheckpoint === 1) {
                if (confirm("This will reset all progress and return you to Level 1. Are you sure?")) {
                    executeHardReset(1);
                }
                return;
            }

            const choice = prompt(
                `You have a checkpoint unlocked!\n\n` +
                `Type 'CHECKPOINT' to restart from Level ${highestCheckpoint}.\n` +
                `Type 'RESET' to erase everything and start back at Level 1.\n\n` +
                `Click Cancel to keep playing your current game.`, 
                "CHECKPOINT"
            );

            if (choice === null) return; 

            const sanitizedChoice = choice.trim().toUpperCase();

            if (sanitizedChoice === "CHECKPOINT") {
                executeHardReset(highestCheckpoint);
            } else if (sanitizedChoice === "RESET") {
                if (confirm("Are you absolutely sure you want to delete ALL progress, including unlocked themes and checkpoints?")) {
                    localStorage.removeItem('highestCheckpoint');
                    executeHardReset(1);
                }
            } else {
                alert("Invalid input. No changes were made.");
            }
        }

        function executeHardReset(targetLevel) {
            localStorage.removeItem('game_state');
            localStorage.setItem('gameLevel', targetLevel);

            if (targetLevel === 1) {
                localStorage.removeItem('discoveredThemes');
                localStorage.removeItem('themePrefs');
            }
            window.location.reload();
        }

        function stringToLightColor(str) {
            let hash = 0;
            for (let i = 0; i < str.length; i++) {
                hash = str.charCodeAt(i) + ((hash << 5) - hash);
            }
            const goldenRatioConjugate = 0.618033988749895;
            let tempValue = Math.abs(hash) * goldenRatioConjugate;
            const h = Math.round((tempValue - Math.floor(tempValue)) * 360);
            const s = 65 + (Math.abs(hash) % 20);
            const l = 45 + (Math.abs(hash >> 3) % 15);
            return `hsl(${h}, ${s}%, ${l}%)`;
        }

        function saveState() {
            const btns = document.querySelectorAll('.game-button');
            const state = Array.from(btns).map(btn => ({
                cat: btn.category,
                clu: btn.cluster,
                htm: btn.innerHTML,
                dis: btn.disabled,
                tN:  btn.targetN 
            }));
            localStorage.setItem('game_state', JSON.stringify(state));
        }

        function loadState() {
            const raw = localStorage.getItem('game_state');
            if (!raw) return;
            const allButtons = JSON.parse(raw);
            const board = document.getElementById("board");
            board.innerHTML = "";

            const totalItems = allButtons.length;
            const cols = calculateColumns(totalItems);

            let currentRow;
            allButtons.forEach((d, i) => {
                if (i % cols === 0) {
                    currentRow = document.createElement('div');
                    currentRow.className = "board-row";
                    board.appendChild(currentRow);
                }
                currentRow.appendChild(createButtonFromData({
                    category: d.cat,
                    cluster: d.clu,
                    innerHTML: d.htm,
                    disabled: d.dis,
                    targetN: d.tN 
                }));
            });

            applyFontSizeScaling();
        }

        function shuffleAndSort() {
            let partials = [], unstarted = [], completed = [];
            const board = document.getElementById("board");
            const currentButtons = board.querySelectorAll('.game-button');
            
            currentButtons.forEach(btn => {
                let item = { 
                    innerHTML: btn.innerHTML, 
                    category: btn.category, 
                    cluster: btn.cluster, 
                    disabled: btn.disabled,
                    targetN: btn.targetN
                };
                if (btn.disabled) completed.push(item);
                else if (btn.cluster.length > 1) partials.push(item);
                else unstarted.push(item);
            });

            shuffleArray(unstarted);
            const masterList = [...partials, ...unstarted, ...completed];
            board.innerHTML = ""; 

            const cols = calculateColumns(masterList.length);
            let currentRow;

            masterList.forEach((data, index) => {
                if (index % cols === 0) {
                    currentRow = document.createElement('div');
                    currentRow.className = "board-row";
                    board.appendChild(currentRow);
                }
                currentRow.appendChild(createButtonFromData(data));
            });
            saveState();
            applyFontSizeScaling();
        }

        const canvas = document.getElementById('fireworks');
        const ctx = canvas.getContext('2d');
        let fireworkTimer = null;
        let particles = [];

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        class Particle {
            constructor(x, y, color) {
                this.x = x;
                this.y = y;
                this.color = color;
                this.angle = Math.random() * Math.PI * 2;
                this.speed = Math.random() * 5 + 2;
                this.friction = 0.95;
                this.gravity = 0.12;
                this.alpha = 1;
                this.decay = Math.random() * 0.015 + 0.01;
            }
            update() {
                this.speed *= this.friction;
                this.x += Math.cos(this.angle) * this.speed;
                this.y += Math.sin(this.angle) * this.speed + this.gravity;
                this.alpha -= this.decay;
            }
            draw() {
                ctx.save();
                ctx.globalAlpha = this.alpha;
                ctx.beginPath();
                ctx.arc(this.x, this.y, 3, 0, Math.PI * 2);
                ctx.fillStyle = this.color;
                ctx.fill();
                ctx.restore();
            }
        }

        function createExplosion() {
            const x = Math.random() * canvas.width;
            const y = Math.random() * (canvas.height * 0.6) + (canvas.height * 0.1);
            const colors = ['#4ecca3', '#ff4b2b', '#ffbe0b', '#3a86ff', '#8338ec'];
            const color = colors[Math.floor(Math.random() * colors.length)];
            
            for (let i = 0; i < 40; i++) {
                particles.push(new Particle(x, y, color));
            }
        }

        function updateFireworks() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            if (Math.random() < 0.1) {
                createExplosion();
            }
            particles = particles.filter(p => p.alpha > 0);
            particles.forEach(p => {
                p.update();
                p.draw();
            });
            fireworkTimer = requestAnimationFrame(updateFireworks);
        }

        function startFireworks() {
            canvas.style.display = 'block';
            resizeCanvas(); 
            updateFireworks();
        }

        function stopFireworks() {
            cancelAnimationFrame(fireworkTimer);
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            canvas.style.display = 'none';
            particles = [];
        }

        function applyFontSizeScaling() {
            const board = document.getElementById("board");
            const totalItems = board.querySelectorAll('.game-button').length;
            if (totalItems > 20) {
                const baseFontSize = Math.max(11, 16 - ((totalItems - 20) / 7)); 
                board.style.fontSize = `${baseFontSize}px`;
            } else {
                board.style.fontSize = '16px';
            }
        }

        window.onload = () => {
            const lvl = parseInt(localStorage.getItem('gameLevel') || 1);
            const config = getLevelConfig(lvl);
            
            M = config.m; 
            N = config.n; 

            document.getElementById("currentLevelDisplay").innerText = lvl;

            const board = document.getElementById("board");
            board.innerHTML = ""; 

            if (!localStorage.getItem('game_state')) {
                checkCategories();
                shuffleArray(wordlist);
                
                const cols = calculateColumns(wordlist.length);

                let currentRow;
                wordlist.forEach((w, i) => {
                    if (i % cols === 0) {
                        currentRow = document.createElement('div');
                        currentRow.className = "board-row";
                        board.appendChild(currentRow);
                    }
                    currentRow.appendChild(createButtonFromData({
                        category: w[1], 
                        cluster: [w[0]], 
                        targetN: w[2]
                    }));
                });
                saveState();
            } else {
                loadState(); 
            }

            applyFontSizeScaling();
        };
    </script>
</body>
